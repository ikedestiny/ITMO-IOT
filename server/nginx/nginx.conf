events {}

http {
    server {
        listen 80;

        location /api/ {
            proxy_pass http://fastapi:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
        }
    }
}
