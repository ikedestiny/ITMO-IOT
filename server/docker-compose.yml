services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:z
      - ./mosquitto/config/passwd:/mosquitto/config/passwd:z
      - ./mosquitto/certs:/mosquitto/certs:z
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  node-red:
    image: nodered/node-red:latest
    user: "root"
    container_name: node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
    depends_on:
      - mosquitto
      - influxdb
    environment:
      - TZ=Europe/Moscow

  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword123
      - DOCKER_INFLUXDB_INIT_ORG=coworking
      - DOCKER_INFLUXDB_INIT_BUCKET=occupancy
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-token

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:z
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - influxdb

  fastapi:
    build: ../backend/api
    container_name: fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=server
      - MQTT_PASS=serverpass
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-super-secret-token
      - INFLUX_ORG=coworking
      - INFLUX_BUCKET=occupancy
      - JWT_SECRET=change-this-secret-in-production
    depends_on:
      - mosquitto
      - influxdb

  telegram-bot:
    build: ../backend/bot
    container_name: telegram-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=8635728420:AAEj0owtIr4m69u5z9hRUEAoQQajWd7KVR4
      - API_URL=http://fastapi:8000
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=server
      - MQTT_PASS=serverpass
    depends_on:
      - fastapi
      - mosquitto

  bridge:
    build: ../backend/bridge
    container_name: bridge
    restart: unless-stopped
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=server
      - MQTT_PASS=serverpass
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-super-secret-token
      - INFLUX_ORG=coworking
      - INFLUX_BUCKET=occupancy
    depends_on:
      - mosquitto
      - influxdb

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:z
    depends_on:
      - fastapi
      - grafana

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data: